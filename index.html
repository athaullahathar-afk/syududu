<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hii Caa 👀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Playfair Display', serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  height: 100vh;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255, 182, 193, 0.1) 0%, transparent 50%);
  animation: shimmer 15s ease-in-out infinite;
  z-index: 1;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.chat-container {
  height: 90vh;
  max-width: 420px;
  margin: 5vh auto;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(30px);
  border-radius: 32px;
  box-shadow: 
    0 40px 120px rgba(0,0,0,0.3),
    0 0 0 1px rgba(255,255,255,0.4);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
}

.chat-header {
  background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(22, 33, 62, 0.95) 100%);
  color: white;
  padding: 35px 30px;
  text-align: center;
  position: relative;
  border-radius: 32px 32px 0 0;
  backdrop-filter: blur(20px);
}

.header-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
  border: 3px solid rgba(255,255,255,0.4);
  animation: pulseGlow 3s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
  50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,255,255,0.6); }
}

.header-title {
  font-size: 26px;
  font-weight: 400;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.header-subtitle {
  font-size: 15px;
  opacity: 0.9;
  font-style: italic;
  font-family: 'Inter', sans-serif;
}

.chat-messages {
  flex: 1;
  padding: 40px 35px;
  overflow-y: auto;
  background: rgba(255,255,255,0.02);
  display: flex;
  flex-direction: column;
  gap: 25px;
  backdrop-filter: blur(15px);
}

.message {
  animation: messageSlide 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-width: 85%;
  font-size: 16px;
  line-height: 1.6;
  font-weight: 400;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(248,250,252,0.9) 100%);
  color: #2d3748;
  padding: 22px 30px;
  border-radius: 28px 28px 10px 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  border-right: 4px solid #ffd700;
}

.message.other {
  align-self: flex-start;
  background: rgba(255,255,255,0.88);
  color: #2d3748;
  padding: 22px 30px;
  border-radius: 28px 28px 28px 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  border-left: 4px solid #ff69b4;
}

.message-time {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 14px;
  font-style: italic;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.3px;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-top: 28px;
}

.date-btn {
  padding: 24px 32px;
  border: 2px solid rgba(255,215,0,0.4);
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-size: 17px;
  font-weight: 500;
  color: #2d1b69;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 35px rgba(0,0,0,0.12);
  font-family: 'Playfair Display', serif;
  letter-spacing: 0.5px;
}

.date-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: left 0.6s;
}

.date-btn:hover::before {
  left: 100%;
}

.date-btn:hover {
  border-color: #ffd700;
  transform: translateY(-8px);
  box-shadow: 0 25px 60px rgba(255,215,0,0.3);
}

.date-btn.selected {
  background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
  color: #1a1a1a;
  border-color: #ffd700;
  transform: translateY(-4px);
  box-shadow: 0 25px 70px rgba(255,215,0,0.4);
  font-weight: 600;
}

.chat-input {
  padding: 40px 35px;
  background: rgba(255,255,255,0.08);
  border-top: 1px solid rgba(255,255,255,0.2);
  display: flex;
  flex-direction: column;
  gap: 25px;
  border-radius: 0 0 32px 32px;
  backdrop-filter: blur(25px);
}

.time-input {
  padding: 26px 35px;
  border: 3px solid rgba(255,255,255,0.5);
  border-radius: 26px;
  font-size: 20px;
  background: rgba(255,255,255,0.96);
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 100%;
  text-align: center;
  font-weight: 500;
  color: #2d1b69;
  font-family: 'Inter', sans-serif;
  letter-spacing: 1px;
}

.time-input:focus {
  outline: none;
  border-color: #ffd700;
  box-shadow: 0 0 0 6px rgba(255,215,0,0.15);
  transform: translateY(-4px);
  background: white;
}

.send-btn {
  width: 100%;
  padding: 28px;
  border: none;
  border-radius: 28px;
  background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
  color: #1a1a1a;
  font-size: 19px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 20px 60px rgba(255,215,0,0.4);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-family: 'Inter', sans-serif;
}

.send-btn:hover:not(:disabled) {
  transform: translateY(-10px);
  box-shadow: 0 35px 80px rgba(255,215,0,0.5);
}

.send-btn:active:not(:disabled) {
  transform: translateY(-6px);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.wa-ready {
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%) !important;
  color: white !important;
  box-shadow: 0 25px 70px rgba(37, 211, 102, 0.5) !important;
}

@keyframes waPulse {
  0%, 100% { box-shadow: 0 20px 60px rgba(37, 211, 102, 0.4); }
  50% { box-shadow: 0 30px 80px rgba(37, 211, 102, 0.7); }
}

.typing-indicator {
  display: none;
  padding: 15px 25px;
  background: rgba(255,255,255,0.1);
  border-radius: 24px;
  margin: 0 15px;
}

.typing-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
}

.typing-dots span {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  animation: typing 1.4s infinite ease-in-out;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
  30% { transform: scale(1.3); opacity: 1; }
}

@media (max-width: 480px) {
  .chat-container { 
    height: 95vh;
    margin: 2.5vh auto;
    max-width: 95%;
    border-radius: 24px;
  }
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">👀</div>
    <h2 class="header-title">Hii Caa</h2>
    <p class="header-subtitle">A special moment awaits</p>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message other">
      Hey... this feels important.<br>
      Let's make time for it.
    </div>
    
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input type="time" class="time-input" id="timeInput" placeholder="Your time">
    <button class="send-btn" id="sendBtn" onclick="confirmDate()" disabled>Choose date first</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const typingIndicator = document.getElementById('typingIndicator');
const timeInput = document.getElementById('timeInput');
const sendBtn = document.getElementById('sendBtn');
let selectedDate = '';
let selectedTime = '';

const dates = [
  { label: '10 May 2026', value: '2026-05-10' },
  { label: '15 May 2026', value: '2026-05-15' },
  { label: '16 May 2026', value: '2026-05-16' }
];

async function startElegantChat() {
  showTyping(true);
  
  await new Promise(resolve => setTimeout(resolve, 1500));
  
  const introMsg = document.createElement('div');
  introMsg.className = 'message other';
  introMsg.innerHTML = `
    These dates work perfectly for me.<br>
    Which resonates with you?
    <div class="date-suggestions">
      ${dates.map((date, index) => 
        `<button class="date-btn" onclick="selectDate('${date.value}', '${date.label}', this)" style="animation-delay: ${index * 0.2}s">
          ${date.label}
        </button>`
      ).join('')}
    </div>
    <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
  `;
  
  messagesEl.appendChild(introMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  showTyping(false);
}

function selectDate(value, label, button) {
  selectedDate = value;
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  button.classList.add('selected');
  
  const confirmMsg = document.createElement('div');
  confirmMsg.className = 'message me';
  confirmMsg.innerHTML = `Perfect. <strong>${label}</strong> feels right.`;
  confirmMsg.innerHTML += `<div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
  
  messagesEl.appendChild(confirmMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  sendBtn.disabled = false;
  sendBtn.textContent = 'Set time';
}

function confirmDate() {
  selectedTime = timeInput.value;
  
  if (!selectedTime) {
    timeInput.style.animation = 'shake 0.6s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(() => timeInput.style.animation = '', 600);
    return;
  }
  
  const dateLabel = dates.find(d => d.value === selectedDate).label;
  const phone = "628XXXXXXXXXX"; // ← GANTI NOMOR LU!
  
  const message = `Hii! 😊 Aku pilih ${dateLabel} jam ${selectedTime} ya. Tunggu GMeet linknya! ✨`;
  const text = encodeURIComponent(message);
  
  sendBtn.innerHTML = '📱 WhatsApp...';
  sendBtn.disabled = true;
  sendBtn.classList.add('wa-ready');
  
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

function showTyping(show = true) {
  typingIndicator.style.display = show ? 'block' : 'none';
  if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
}

timeInput.addEventListener('input', function() {
  if (selectedDate && this.value) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Confirm & Send';
    sendBtn.classList.add('wa-ready');
  }
});

// Shake animation
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
    20%, 40%, 60%, 80% { transform: translateX(6px); }
  }
`;
document.head.appendChild(shakeStyle);

// Start
startElegantChat();
</script>
</body>
</html>
