<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Night Discussion 🎥</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
  position: relative;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 300% 300%;
  animation: gradientShift 12s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.video-icons {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.video-icon {
  position: absolute;
  font-size: 35px;
  opacity: 0.7;
  animation: floatVideo 6s linear infinite;
}

@keyframes floatVideo {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(-50px) rotate(360deg) scale(1.2); opacity: 0; }
}

.chat-container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 450px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(30px);
  box-shadow: 0 35px 120px rgba(0,0,0,0.25);
  z-index: 10;
  position: relative;
  border-radius: 25px;
  margin: 20px;
}

.chat-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 35px;
  text-align: center;
  position: relative;
  border-radius: 25px 25px 0 0;
}

.header-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  margin: 0 auto 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  animation: pulseGlow 2s ease-in-out infinite;
  box-shadow: 0 0 40px rgba(255,255,255,0.5);
}

@keyframes pulseGlow {
  0%, 100% { 
    transform: scale(1); 
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
  }
  50% { 
    transform: scale(1.08); 
    box-shadow: 0 0 40px rgba(255,255,255,0.8);
  }
}

.meet-link {
  background: rgba(255,255,255,0.2);
  padding: 15px 25px;
  border-radius: 20px;
  margin-top: 15px;
  font-size: 14px;
  backdrop-filter: blur(10px);
}

.chat-messages {
  flex: 1;
  padding: 35px;
  overflow-y: auto;
  background: rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  gap: 22px;
  backdrop-filter: blur(10px);
}

.message {
  animation: messageSlide 0.6s ease-out;
  max-width: 92%;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(50px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  color: #333;
  padding: 20px 25px;
  border-radius: 30px 30px 12px 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.message.other {
  align-self: flex-start;
  background: rgba(255,255,255,0.92);
  padding: 20px 25px;
  border-radius: 30px 30px 30px 12px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.15);
  border-left: 6px solid #667eea;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

.date-btn {
  padding: 20px 25px;
  border: 3px solid #764ba2;
  background: rgba(255,255,255,0.95);
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.4s ease;
  font-size: 17px;
  font-weight: 700;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.date-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.5s;
}

.date-btn:hover::before {
  left: 100%;
}

.date-btn:hover {
  background: #764ba2;
  color: white;
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 20px 45px rgba(118, 75, 162, 0.4);
}

.date-btn.selected {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: #667eea;
  transform: scale(1.05);
}

.message-time {
  font-size: 14px;
  opacity: 0.8;
  margin-top: 12px;
  font-style: italic;
}

.chat-input {
  padding: 35px;
  background: rgba(255,255,255,0.15);
  border-top: 1px solid rgba(255,255,255,0.5);
  display: flex;
  flex-direction: column;
  gap: 20px;
  backdrop-filter: blur(20px);
  border-radius: 0 0 25px 25px;
}

.time-input {
  padding: 22px 30px;
  border: 4px solid rgba(255,255,255,0.7);
  border-radius: 35px;
  font-size: 20px;
  background: rgba(255,255,255,0.98);
  transition: all 0.4s ease;
  width: 100%;
  text-align: center;
}

.time-input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.25);
  transform: scale(1.04);
}

.send-btn {
  width: 100%;
  padding: 25px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.4s ease;
  box-shadow: 0 15px 45px rgba(102, 126, 234, 0.35);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.send-btn:hover:not(:disabled) {
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 25px 60px rgba(102, 126, 234, 0.45);
}

.send-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.meet-ready {
  background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 15px 45px rgba(79, 172, 254, 0.35); }
  50% { box-shadow: 0 25px 60px rgba(79, 172, 254, 0.6); }
}
</style>
</head>
<body>
<div class="video-icons" id="videoIcons"></div>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">🎥</div>
    <h2>Google Meet Call</h2>
    <div class="meet-link">
      📹 Ready to discuss?<br>
      ⏰ Pick time & I'll create the link!
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message other">
      Hey... 🎥<br><br>
      Text isn't enough anymore.<br>
      I wanna see you and say this properly.
    </div>
    
    <div class="message other typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input type="time" class="time-input" id="timeInput" placeholder="🕒 What time?">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>📅 Pick a day first!</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const typingIndicator = document.getElementById('typingIndicator');
const timeInput = document.getElementById('timeInput');
const sendBtn = document.getElementById('sendBtn');
let selectedDate = '';
let selectedTime = '';

const dateSuggestions = [
  { date: 'Tonight (video call)', value: new Date().toDateString() },
  { date: 'Tomorrow evening', value: new Date(Date.now() + 86400000).toDateString() },
  { date: 'This weekend', value: getNextSaturday() },
  { date: 'Whenever you free', value: 'Anytime' }
];

function getNextSaturday() {
  const today = new Date();
  const nextSaturday = new Date(today);
  nextSaturday.setDate(today.getDate() + ((6 - today.getDay() + 7) % 7 || 7));
  return nextSaturday.toDateString();
}

async function startVideoConfession() {
  showTyping(true);
  
  await addMessage("This is important... needs to be face-to-face (virtually 😊)");
  await addMessage("When can we video call? Pick a time ⬇️");
  
  // Video call suggestions
  const suggestionsMsg = document.createElement('div');
  suggestionsMsg.className = 'message other';
  suggestionsMsg.innerHTML = `
    <div class="date-suggestions">
      ${dateSuggestions.map(s => 
        `<button class="date-btn" onclick="selectDate('${s.value}')">${s.date}</button>`
      ).join('')}
    </div>
    <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
  `;
  messagesEl.appendChild(suggestionsMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  showTyping(false);
}

function selectDate(dateValue) {
  selectedDate = dateValue;
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  event.target.classList.add('selected');
  
  addMessage(`Perfect! "${selectedDate}" works great 🎥`, true);
  sendBtn.disabled = false;
  sendBtn.textContent = '🎬 Confirm time & create Meet';
}

function addMessage(text, isMe = false, delay = 1200) {
  return new Promise(resolve => {
    setTimeout(() => {
      const message = document.createElement('div');
      message.className = `message ${isMe ? 'me' : 'other'}`;
      message.innerHTML = text + `<div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
      messagesEl.appendChild(message);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping(show = true) {
  typingIndicator.style.display = show ? 'block' : 'none';
  if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage() {
  selectedTime = timeInput.value;
  
  if (!selectedDate || !selectedTime) {
    timeInput.style.animation = 'shake 0.6s';
    setTimeout(() => timeInput.style.animation = '', 600);
    return;
  }
  
  sendBtn.disabled = true;
  sendBtn.classList.add('meet-ready');
  sendBtn.textContent = '🎥 Creating Google Meet...';
  
  addMessage(`Google Meet: ${selectedDate} ${selectedTime} 📹`, true);
  
  setTimeout(async () => {
    await addMessage("Here's the link - ready when you are! 😊");
    sendBtn.textContent = '🚀 Send Meet Link';
    sendBtn.onclick = sendMeetLink;
  }, 1500);
}

function sendMeetLink() {
  const phone = "6285701037489"; // ← HER NUMBER!
  const meetDateTime = `${selectedDate} at ${selectedTime}`;
  const text = encodeURIComponent(`Hey! 🎥 Google Meet time: ${meetDateTime}\n\nThis is important - I wanna say it face to face 😌\n\n[Meet link coming soon - reply YES to confirm!]`);  
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

// Video call animations
function createVideoIcon() {
  const icons = ['📹','🎥','📺','💻','📱','🔴','▶️','⏸️'];
  const icon = document.createElement('div');
  icon.className = 'video-icon';
  icon.innerHTML = icons[Math.floor(Math.random()*icons.length)];
  icon.style.left = Math.random() * 100 + 'vw';
  icon.style.animationDelay = Math.random() * 3 + 's';
  document.getElementById('videoIcons').appendChild(icon);
  
  setTimeout(() => icon.remove(), 6000);
}

setInterval(createVideoIcon, 800);

// Shake animation
const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
`;
document.head.appendChild(style);

// GO TIME!
startVideoConfession();

timeInput.addEventListener('input', () => {
  if (selectedDate && timeInput.value) {
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
