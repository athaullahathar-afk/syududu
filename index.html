<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Invitation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Playfair Display', 'Georgia', serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #2d1b69 100%);
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.1) 0%, transparent 40%),
    radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
  animation: glow 12s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.invitation-card {
  width: 380px;
  height: 620px;
  background: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%);
  border-radius: 28px;
  box-shadow: 
    0 35px 100px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,255,255,0.5),
    inset 0 1px 0 rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.3);
}

.card-header {
  background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffb347 100%);
  padding: 35px 30px;
  text-align: center;
  border-radius: 28px 28px 0 0;
  position: relative;
  box-shadow: inset 0 2px 10px rgba(255,215,0,0.3);
}

.header-ornament {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.6));
  margin: 0 auto 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 
    0 8px 25px rgba(255,215,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.9);
  border: 2px solid rgba(255,255,255,0.8);
}

.header-title {
  font-size: 24px;
  font-weight: 400;
  color: #1a1a1a;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.header-subtitle {
  font-size: 14px;
  color: #666;
  font-style: italic;
  letter-spacing: 0.5px;
}

.messages-container {
  height: 280px;
  padding: 35px 30px;
  overflow-y: auto;
  background: rgba(255,255,255,0.02);
  display: flex;
  flex-direction: column;
  gap: 22px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.message {
  animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-width: 85%;
  font-size: 15px;
  line-height: 1.6;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.other {
  align-self: flex-start;
  background: linear-gradient(135deg, rgba(255,192,203,0.9) 0%, rgba(255,182,193,0.8) 100%);
  color: #4a2c4a;
  padding: 20px 28px;
  border-radius: 24px 24px 24px 8px;
  box-shadow: 0 8px 30px rgba(255,105,180,0.3);
  border-right: 3px solid #ff69b4;
  font-weight: 400;
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(250,250,252,0.9) 100%);
  color: #2d1b69;
  padding: 20px 28px;
  border-radius: 24px 24px 8px 24px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  border-left: 3px solid #ffd700;
  font-weight: 400;
}

.message-time {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 12px;
  font-style: italic;
  text-align: right;
  letter-spacing: 0.3px;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 25px;
}

.date-btn {
  padding: 22px 28px;
  border: 2px solid rgba(255,215,0,0.4);
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-size: 16px;
  font-weight: 500;
  color: #2d1b69;
  position: relative;
  box-shadow: 0 6px 25px rgba(0,0,0,0.1);
  text-align: center;
  letter-spacing: 0.5px;
}

.date-btn:hover {
  border-color: #ffd700;
  background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,255,255,0.95));
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(255,215,0,0.3);
  color: #1a1a1a;
}

.date-btn.selected {
  background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
  color: #1a1a1a;
  border-color: #ffd700;
  transform: translateY(-3px);
  box-shadow: 0 18px 55px rgba(255,215,0,0.4);
  font-weight: 600;
}

.input-section {
  padding: 35px 30px;
  background: rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
  gap: 25px;
  border-radius: 0 0 28px 28px;
  backdrop-filter: blur(20px);
}

.time-input {
  padding: 24px 32px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 24px;
  font-size: 18px;
  background: rgba(255,255,255,0.95);
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 100%;
  text-align: center;
  font-weight: 500;
  color: #2d1b69;
  font-family: inherit;
  letter-spacing: 1px;
}

.time-input:focus {
  outline: none;
  border-color: #ffd700;
  box-shadow: 0 0 0 6px rgba(255,215,0,0.15);
  transform: translateY(-3px);
  background: white;
}

.confirm-btn {
  width: 100%;
  padding: 26px;
  border: none;
  border-radius: 26px;
  background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
  color: #1a1a1a;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 15px 45px rgba(255,215,0,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
}

.confirm-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.7s;
}

.confirm-btn:hover:not(:disabled)::before {
  left: 100%;
}

.confirm-btn:hover:not(:disabled) {
  transform: translateY(-8px);
  box-shadow: 0 30px 70px rgba(255,215,0,0.5);
  color: #000;
}

.confirm-btn:active:not(:disabled) {
  transform: translateY(-4px);
}

.confirm-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.wa-ready {
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%) !important;
  box-shadow: 0 20px 60px rgba(37, 211, 102, 0.5) !important;
  color: white !important;
}

@keyframes waPulse {
  0%, 100% { box-shadow: 0 15px 45px rgba(37, 211, 102, 0.4); }
  50% { box-shadow: 0 25px 70px rgba(37, 211, 102, 0.7); }
}
</style>
</head>
<body>
<div class="invitation-card">
  <div class="card-header">
    <div class="header-ornament">📱</div>
    <h1 class="header-title">Your Invitation</h1>
    <p class="header-subtitle">A moment awaits your choice</p>
  </div>

  <div class="messages-container" id="messages">
    <div class="message other">
      I've been meaning to share something important.<br>
      These dates are perfect for us.
    </div>
  </div>

  <div class="input-section">
    <input type="time" class="time-input" id="timeInput" placeholder="Select your time">
    <button class="confirm-btn" id="confirmBtn" onclick="sendInvitation()" disabled>Choose your moment</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const timeInput = document.getElementById('timeInput');
const confirmBtn = document.getElementById('confirmBtn');
let selectedDate = '';
let selectedTime = '';

const dates = [
  { label: '10 May 2026', value: '2026-05-10' },
  { label: '15 May 2026', value: '2026-05-15' },
  { label: '16 May 2026', value: '2026-05-16' }
];

function createDateSelection() {
  const container = document.createElement('div');
  container.className = 'date-suggestions';
  container.innerHTML = dates.map((date, index) => 
    `<button class="date-btn" onclick="selectDate('${date.value}', '${date.label}', this)" style="animation-delay: ${index * 0.3}s">
      ${date.label}
    </button>`
  ).join('');
  
  const message = document.createElement('div');
  message.className = 'message other';
  message.appendChild(container);
  message.innerHTML += `<div class="message-time">Awaiting your choice</div>`;
  
  messagesEl.appendChild(message);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function selectDate(value, label, button) {
  selectedDate = value;
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  button.classList.add('selected');
  
  const confirmMsg = document.createElement('div');
  confirmMsg.className = 'message me';
  confirmMsg.innerHTML = `Beautiful choice. <strong>${label}</strong>`;
  confirmMsg.innerHTML += `<div class="message-time">Confirmed</div>`;
  
  messagesEl.appendChild(confirmMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  confirmBtn.disabled = false;
  confirmBtn.textContent = 'Set the time';
}

function sendInvitation() {
  selectedTime = timeInput.value;
  
  if (!selectedTime) {
    timeInput.style.animation = 'shake 0.6s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(() => timeInput.style.animation = '', 600);
    return;
  }
  
  const dateLabel = dates.find(d => d.value === selectedDate).label;
  const phone = "628XXXXXXXXXX"; // ← NOMOR LU!
  
  const message = `I've selected ${dateLabel} at ${selectedTime}.\n\nReady when you are.`;
  const text = encodeURIComponent(message);
  
  confirmBtn.innerHTML = '✉️ Sending...';
  confirmBtn.disabled = true;
  confirmBtn.classList.add('wa-ready');
  
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

timeInput.addEventListener('input', function() {
  if (selectedDate && this.value) {
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'Send Invitation';
    confirmBtn.classList.add('wa-ready');
  }
});

// Initialize
setTimeout(createDateSelection, 1200);

// Shake animation
const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
    20%, 40%, 60%, 80% { transform: translateX(8px); }
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
