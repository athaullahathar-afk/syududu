<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Moment With You</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  height: 100vh;
  overflow: hidden;
  position: relative;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #385cbf 100%);
  background-size: 400% 400%;
  animation: gradientShift 20s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
              radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
  animation: shimmer 8s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.chat-container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(40px);
  box-shadow: 0 40px 140px rgba(0,0,0,0.3);
  z-index: 10;
  position: relative;
  border-radius: 32px;
  border: 1px solid rgba(255,255,255,0.2);
}

.chat-header {
  background: linear-gradient(135deg, rgba(30, 60, 114, 0.95) 0%, rgba(42, 82, 152, 0.95) 100%);
  color: white;
  padding: 45px 40px;
  text-align: center;
  position: relative;
  border-radius: 32px 32px 0 0;
  backdrop-filter: blur(20px);
}

.header-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
  margin: 0 auto 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  box-shadow: 0 0 50px rgba(255,255,255,0.4);
  border: 3px solid rgba(255,255,255,0.3);
}

.header-title {
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.header-subtitle {
  font-size: 16px;
  opacity: 0.9;
  font-style: italic;
  letter-spacing: 0.5px;
}

.chat-messages {
  flex: 1;
  padding: 45px 40px;
  overflow-y: auto;
  background: rgba(255,255,255,0.04);
  display: flex;
  flex-direction: column;
  gap: 28px;
  backdrop-filter: blur(15px);
}

.message {
  animation: messageSlide 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-width: 90%;
}

@keyframes messageSlide {
  from { 
    opacity: 0; 
    transform: translateY(60px) scale(0.95); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(248,250,252,0.8) 100%);
  color: #2d3748;
  padding: 25px 32px;
  border-radius: 0 36px 36px 36px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  border-right: 4px solid #667eea;
  font-size: 16px;
  line-height: 1.6;
  font-weight: 400;
}

.message.other {
  align-self: flex-start;
  background: rgba(255,255,255,0.88);
  color: #2d3748;
  padding: 25px 32px;
  border-radius: 36px 36px 36px 0;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  border-left: 4px solid #667eea;
  font-size: 16px;
  line-height: 1.6;
  font-weight: 400;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 30px;
}

.date-btn {
  padding: 28px 35px;
  border: 2px solid rgba(102, 126, 234, 0.3);
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  color: #4a5568;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
}

.date-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: left 0.6s;
}

.date-btn:hover::before {
  left: 100%;
}

.date-btn:hover {
  border-color: #667eea;
  color: #2d3748;
  transform: translateY(-8px);
  box-shadow: 0 24px 60px rgba(102, 126, 234, 0.25);
}

.date-btn.selected {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: rgba(102, 126, 234, 0.5);
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 28px 80px rgba(102, 126, 234, 0.35);
}

.date-btn.selected::before {
  display: none;
}

.message-time {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 16px;
  font-style: italic;
  letter-spacing: 0.3px;
}

.chat-input {
  padding: 50px 45px;
  background: rgba(255,255,255,0.08);
  border-top: 1px solid rgba(255,255,255,0.2);
  display: flex;
  flex-direction: column;
  gap: 30px;
  backdrop-filter: blur(25px);
  border-radius: 0 0 32px 32px;
}

.time-input {
  padding: 28px 40px;
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 28px;
  font-size: 20px;
  background: rgba(255,255,255,0.95);
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 100%;
  text-align: center;
  font-weight: 500;
  color: #4a5568;
  font-family: inherit;
  letter-spacing: 1px;
}

.time-input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 8px rgba(102, 126, 234, 0.15);
  transform: translateY(-4px) scale(1.02);
  background: white;
}

.send-btn {
  width: 100%;
  padding: 32px;
  border: none;
  border-radius: 32px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.35);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
}

.send-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.6s;
}

.send-btn:hover:not(:disabled)::before {
  left: 100%;
}

.send-btn:hover:not(:disabled) {
  transform: translateY(-10px);
  box-shadow: 0 35px 90px rgba(102, 126, 234, 0.45);
}

.send-btn:active:not(:disabled) {
  transform: translateY(-6px);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.wa-ready {
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%) !important;
  box-shadow: 0 25px 80px rgba(37, 211, 102, 0.4) !important;
}

@keyframes whatsappPulse {
  0%, 100% { box-shadow: 0 20px 60px rgba(37, 211, 102, 0.35); }
  50% { box-shadow: 0 35px 90px rgba(37, 211, 102, 0.6); }
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">📱</div>
    <h1 class="header-title">A Private Moment</h1>
    <p class="header-subtitle">Choose your time. I'll be waiting.</p>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message other">
      There are words I need to share with you.<br><br>
      Face to face. Heart to heart.<br>
      These dates work for me.
    </div>
  </div>

  <div class="chat-input">
    <input type="time" class="time-input" id="timeInput" placeholder="Your preferred time">
    <button class="send-btn" id="sendBtn" onclick="confirmSelection()" disabled>Choose your moment</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const timeInput = document.getElementById('timeInput');
const sendBtn = document.getElementById('sendBtn');
let selectedDate = '';
let selectedTime = '';

const dates = [
  { label: '10 May 2026', value: '2026-05-10' },
  { label: '15 May 2026', value: '2026-05-15' },
  { label: '16 May 2026', value: '2026-05-16' }
];

// Create elegant date buttons
function createDateButtons() {
  const container = document.createElement('div');
  container.className = 'date-suggestions';
  container.innerHTML = dates.map((date, index) => 
    `<button class="date-btn" onclick="selectDate('${date.value}', '${date.label}', this)" style="animation-delay: ${index * 0.2}s">
      <strong>${date.label}</strong>
    </button>`
  ).join('');
  
  const message = document.createElement('div');
  message.className = 'message other';
  message.appendChild(container);
  message.innerHTML += `<div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
  
  messagesEl.appendChild(message);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function selectDate(value, label, button) {
  selectedDate = value;
  
  // Remove previous selection
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  button.classList.add('selected');
  
  // Confirmation message
  const confirmMsg = document.createElement('div');
  confirmMsg.className = 'message me';
  confirmMsg.innerHTML = `Perfect. <strong>${label}</strong> resonates with me.`;
  confirmMsg.innerHTML += `<div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
  
  messagesEl.appendChild(confirmMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  sendBtn.disabled = false;
  sendBtn.textContent = 'Set the time';
}

function confirmSelection() {
  selectedTime = timeInput.value;
  
  if (!selectedTime) {
    timeInput.style.animation = 'shake 0.6s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(() => timeInput.style.animation = '', 600);
    return;
  }
  
  const dateLabel = dates.find(d => d.value === selectedDate).label;
  const phone = "628XXXXXXXXXX"; // ← NOMOR LU!
  
  const message = `I've chosen ${dateLabel} at ${selectedTime}.\n\nSend me the moment.`;
  const text = encodeURIComponent(message);
  
  sendBtn.innerHTML = 'Connecting...';
  sendBtn.disabled = true;
  sendBtn.classList.add('wa-ready');
  
  // DIRECT WHATSAPP
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

// Input events
timeInput.addEventListener('input', function() {
  if (selectedDate && this.value) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Confirm & Message';
    sendBtn.classList.add('wa-ready');
  }
});

// Initialize
setTimeout(() => {
  createDateButtons();
}, 800);

// Shake animation
const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
