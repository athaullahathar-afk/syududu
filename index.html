<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hii Caa 👀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 50%, #fef5ff 100%);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-container {
  width: 100%;
  max-width: 360px;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(25px);
  border-radius: 24px;
  box-shadow: 
    0 25px 80px rgba(255, 182, 193, 0.3),
    0 0 0 1px rgba(255,255,255,0.8);
  border: 1px solid rgba(255,255,255,0.6);
  overflow: hidden;
  animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes slideUp {
  from { 
    opacity: 0; 
    transform: translateY(50px) scale(0.95); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

.chat-header {
  background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 50%, #ffb6c1 100%);
  color: white;
  padding: 30px 25px;
  text-align: center;
  position: relative;
  box-shadow: 0 4px 20px rgba(255, 105, 180, 0.3);
}

.header-avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  margin: 0 auto 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 8px 25px rgba(255,255,255,0.4);
  border: 3px solid rgba(255,255,255,0.6);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.header-title {
  font-size: 24px;
  font-weight: 500;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.header-subtitle {
  font-size: 14px;
  opacity: 0.9;
  font-weight: 300;
}

.chat-messages {
  height: 320px;
  padding: 30px 25px;
  overflow-y: auto;
  background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,248,250,0.6));
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,105,180,0.3) transparent;
}

.chat-messages::-webkit-scrollbar {
  width: 4px;
}

.chat-messages::-webkit-scrollbar-track {
  background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(255,105,180,0.3);
  border-radius: 2px;
}

.message {
  animation: messageSlide 0.5s ease-out;
  max-width: 85%;
  font-size: 15px;
  line-height: 1.5;
  font-weight: 400;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.other {
  align-self: flex-start;
  background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,248,250,0.9) 100%);
  color: #333;
  padding: 18px 25px;
  border-radius: 22px 22px 22px 6px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  border-left: 4px solid #ff69b4;
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, #ff69b4 0%, #ffb6c1 100%);
  color: white;
  padding: 18px 25px;
  border-radius: 22px 22px 6px 22px;
  box-shadow: 0 8px 25px rgba(255,105,180,0.3);
  font-weight: 500;
}

.message-time {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
  font-weight: 300;
  text-align: right;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 20px;
}

.date-btn {
  padding: 20px 24px;
  border: 2px solid rgba(255,182,193,0.5);
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  font-size: 16px;
  font-weight: 500;
  color: #333;
  position: relative;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  font-family: inherit;
}

.date-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.5s;
}

.date-btn:hover::before {
  left: 100%;
}

.date-btn:hover {
  border-color: #ff69b4;
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 18px 40px rgba(255,105,180,0.25);
}

.date-btn:active {
  transform: translateY(-3px) scale(1);
}

.date-btn.selected {
  background: linear-gradient(135deg, #ff69b4 0%, #ffb6c1 100%);
  color: white;
  border-color: #ff69b4;
  transform: translateY(-2px);
  box-shadow: 0 15px 45px rgba(255,105,180,0.35);
}

.chat-input {
  padding: 30px 25px;
  background: rgba(255,255,255,0.7);
  border-top: 1px solid rgba(255,255,255,0.5);
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-radius: 0 0 24px 24px;
  backdrop-filter: blur(20px);
}

.time-input {
  padding: 22px 28px;
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 22px;
  font-size: 18px;
  background: rgba(255,255,255,0.98);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 100%;
  text-align: center;
  font-weight: 500;
  color: #333;
  font-family: inherit;
}

.time-input:focus {
  outline: none;
  border-color: #ff69b4;
  box-shadow: 0 0 0 4px rgba(255,105,180,0.15);
  transform: translateY(-3px) scale(1.02);
}

.send-btn {
  width: 100%;
  padding: 22px;
  border: none;
  border-radius: 22px;
  background: linear-gradient(135deg, #ff69b4 0%, #ffb6c1 100%);
  color: white;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 12px 35px rgba(255,105,180,0.35);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.send-btn:hover:not(:disabled) {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 22px 50px rgba(255,105,180,0.45);
}

.send-btn:active:not(:disabled) {
  transform: translateY(-3px);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.wa-ready {
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%) !important;
  box-shadow: 0 15px 45px rgba(37, 211, 102, 0.4) !important;
}

@keyframes waPulse {
  0%, 100% { box-shadow: 0 12px 35px rgba(37, 211, 102, 0.35); }
  50% { box-shadow: 0 20px 55px rgba(37, 211, 102, 0.6); }
}

@media (max-width: 480px) {
  body { padding: 10px; }
  .chat-container { 
    max-width: 95%;
    margin: 0 auto;
    height: 85vh;
  }
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">👀</div>
    <h2 class="header-title">Hii Caa</h2>
    <p class="header-subtitle">Choose our moment</p>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message other">
      This matters to me.<br>
      Pick one of these dates:
    </div>
  </div>

  <div class="chat-input">
    <input type="time" class="time-input" id="timeInput" placeholder="Select time">
    <button class="send-btn" id="sendBtn" onclick="sendWhatsApp()" disabled>Select date first</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const timeInput = document.getElementById('timeInput');
const sendBtn = document.getElementById('sendBtn');
let selectedDate = '';
let selectedTime = '';

const dates = [
  { label: '10 May 2026', value: '2026-05-10' },
  { label: '15 May 2026', value: '2026-05-15' },
  { label: '16 May 2026', value: '2026-05-16' }
];

// Create clickable date buttons
function createDateButtons() {
  const container = document.createElement('div');
  container.className = 'date-suggestions';
  container.innerHTML = dates.map((date, index) => 
    `<button class="date-btn" onclick="selectDate('${date.value}', '${date.label}', this)">
      📅 ${date.label}
    </button>`
  ).join('');
  
  const message = document.createElement('div');
  message.className = 'message other';
  message.appendChild(container);
  message.innerHTML += `<div class="message-time">Choose wisely ✨</div>`;
  
  messagesEl.appendChild(message);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function selectDate(value, label, button) {
  selectedDate = value;
  
  // Remove previous selection
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  button.classList.add('selected');
  
  // Show confirmation
  const confirmMsg = document.createElement('div');
  confirmMsg.className = 'message me';
  confirmMsg.innerHTML = `Perfect! <strong>${label}</strong>`;
  confirmMsg.innerHTML += `<div class="message-time">Date locked in 😊</div>`;
  
  messagesEl.appendChild(confirmMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  sendBtn.disabled = false;
  sendBtn.textContent = 'Set time';
}

function sendWhatsApp() {
  selectedTime = timeInput.value;
  
  if (!selectedTime) {
    // Shake animation
    timeInput.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(() => timeInput.style.animation = '', 500);
    return;
  }
  
  const dateLabel = dates.find(d => d.value === selectedDate).label;
  const phone = "628XXXXXXXXXX"; // ← GANTI NOMOR LU DISINI!
  
  const message = `Hii Caa! 😊 Aku free ${dateLabel} jam ${selectedTime}. Mau GMeet yuk? 📱✨`;
  const text = encodeURIComponent(message);
  
  sendBtn.innerHTML = '📱 WhatsApp';
  sendBtn.disabled = true;
  sendBtn.classList.add('wa-ready');
  
  // Direct WhatsApp
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

// Real-time validation
timeInput.addEventListener('input', function() {
  if (selectedDate && this.value) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Confirm & Chat';
    sendBtn.classList.add('wa-ready');
  }
});

// Shake animation
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
  }
`;
document.head.appendChild(shakeStyle);

// Initialize
setTimeout(createDateButtons, 800);
</script>
</body>
</html>
