<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>bhaaap 🎥</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
  position: relative;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 300% 300%;
  animation: gradientShift 10s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.video-icons {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.video-icon {
  position: absolute;
  font-size: 32px;
  opacity: 0.8;
  animation: floatVideo 7s linear infinite;
}

@keyframes floatVideo {
  0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
}

.chat-container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 450px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(30px);
  box-shadow: 0 35px 120px rgba(0,0,0,0.25);
  z-index: 10;
  position: relative;
  border-radius: 25px;
  margin: 20px;
}

.chat-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 35px;
  text-align: center;
  position: relative;
  border-radius: 25px 25px 0 0;
}

.header-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  margin: 0 auto 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  animation: pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(255,255,255,0.6); }
  50% { transform: scale(1.08); box-shadow: 0 0 45px rgba(255,255,255,0.9); }
}

.chat-messages {
  flex: 1;
  padding: 35px;
  overflow-y: auto;
  background: rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  gap: 22px;
  backdrop-filter: blur(10px);
}

.message {
  animation: messageSlide 0.6s ease-out;
  max-width: 95%;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.me {
  align-self: flex-end;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  color: #333;
  padding: 20px 25px;
  border-radius: 30px 30px 12px 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  font-weight: 500;
}

.message.other {
  align-self: flex-start;
  background: rgba(255,255,255,0.92);
  padding: 20px 25px;
  border-radius: 30px 30px 30px 12px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.15);
  border-left: 6px solid #667eea;
  font-weight: 500;
}

.date-suggestions {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-top: 25px;
}

.date-btn {
  padding: 25px 30px;
  border: 4px solid #764ba2;
  background: rgba(255,255,255,0.98);
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  font-size: 18px;
  font-weight: 800;
  text-align: center;
  position: relative;
  color: #333;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.date-btn:hover {
  background: #764ba2;
  color: white;
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 25px 50px rgba(118, 75, 162, 0.4);
  border-color: #667eea;
}

.date-btn.selected {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: #667eea;
  transform: scale(1.08);
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
}

.message-time {
  font-size: 14px;
  opacity: 0.8;
  margin-top: 12px;
  font-style: italic;
}

.chat-input {
  padding: 40px;
  background: rgba(255,255,255,0.2);
  border-top: 2px solid rgba(255,255,255,0.6);
  display: flex;
  flex-direction: column;
  gap: 25px;
  backdrop-filter: blur(20px);
  border-radius: 0 0 25px 25px;
}

.time-input {
  padding: 25px 35px;
  border: 4px solid rgba(255,255,255,0.8);
  border-radius: 40px;
  font-size: 22px;
  background: rgba(255,255,255,0.99);
  transition: all 0.4s ease;
  width: 100%;
  text-align: center;
  font-weight: 700;
  color: #333;
}

.time-input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 8px rgba(102, 126, 234, 0.25);
  transform: scale(1.05);
}

.send-btn {
  width: 100%;
  padding: 28px;
  border: none;
  border-radius: 45px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 24px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.4s ease;
  box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.send-btn:hover:not(:disabled) {
  transform: translateY(-12px) scale(1.08);
  box-shadow: 0 35px 70px rgba(102, 126, 234, 0.5);
}

.send-btn:active {
  transform: translateY(-8px) scale(1.05);
}

.send-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.wa-ready {
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%) !important;
  animation: whatsappPulse 1.5s infinite;
}

@keyframes whatsappPulse {
  0%, 100% { box-shadow: 0 20px 50px rgba(37, 211, 102, 0.4); }
  50% { box-shadow: 0 30px 70px rgba(37, 211, 102, 0.7); }
}
</style>
</head>
<body>
<div class="video-icons" id="videoIcons"></div>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">📱</div>
    <h2>Chat Me on WA</h2>
    <div style="font-size: 16px; margin-top: 15px;">
      Pick date & time → I'll send GMeet link!
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message other">
      Hii caa! 📹<br><br>
      I want to tell you something.<br>
      And I think, we need to use gmeet 😌
    </div>
    
    <div class="message other typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input type="time" class="time-input" id="timeInput" placeholder="⏰ Pilih jam">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Pilih tanggal dulu!</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const typingIndicator = document.getElementById('typingIndicator');
const timeInput = document.getElementById('timeInput');
const sendBtn = document.getElementById('sendBtn');
let selectedDate = '';
let selectedTime = '';

// FIXED DATES EXACTLY AS YOU WANTED
const dateSuggestions = [
  { label: '10 May 2026', value: '2026-05-10' },
  { label: '15 May 2026', value: '2026-05-15' },
  { label: '16 May 2026', value: '2026-05-16' }
];

async function startChat() {
  showTyping(true);
  
  await addMessage("Pilih salah satu tanggal ini ya:");
  await addMessage("Aku siap video call kapan aja di tanggal itu!");
  
  // Show exact dates
  const suggestionsMsg = document.createElement('div');
  suggestionsMsg.className = 'message other';
  suggestionsMsg.innerHTML = `
    <div class="date-suggestions">
      ${dateSuggestions.map(s => 
        `<button class="date-btn" onclick="selectDate('${s.value}', '${s.label}')">
          📅 ${s.label}
        </button>`
      ).join('')}
    </div>
    <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
  `;
  messagesEl.appendChild(suggestionsMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  showTyping(false);
}

function selectDate(dateValue, dateLabel) {
  selectedDate = dateValue;
  document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('selected'));
  event.target.classList.add('selected');
  
  addMessage(`Nice! ${dateLabel} confirmed! 😊`, true);
  sendBtn.disabled = false;
  sendBtn.textContent = '⏰ Pilih jam dulu';
}

function addMessage(text, isMe = false, delay = 1000) {
  return new Promise(resolve => {
    setTimeout(() => {
      const message = document.createElement('div');
      message.className = `message ${isMe ? 'me' : 'other'}`;
      message.innerHTML = text + `<div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
      messagesEl.appendChild(message);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping(show = true) {
  typingIndicator.style.display = show ? 'block' : 'none';
  if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage() {
  selectedTime = timeInput.value;
  
  if (!selectedDate || !selectedTime) {
    // Shake effect
    timeInput.style.animation = 'shake 0.6s cubic-bezier(.36,.07,.19,.97)';
    setTimeout(() => timeInput.style.animation = '', 600);
    return;
  }
  
  // DIRECT TO WHATSAPP!
  const dateLabel = dateSuggestions.find(d => d.value === selectedDate).label;
  const phone = "6285701037489"; // ← NOMOR LU BRO!
  const text = encodeURIComponent(`Hai! 😊 Aku pilih ${dateLabel} jam ${selectedTime} free nih! Kirim linknya ya!`);
  
  sendBtn.innerHTML = '📱 Opening WhatsApp...';
  sendBtn.disabled = true;
  
  // Open WhatsApp DIRECTLY
  window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
}

document.getElementById('timeInput').addEventListener('input', function() {
  if (selectedDate && this.value) {
    sendBtn.disabled = false;
    sendBtn.textContent = '📱 Chat me on WA!';
    sendBtn.classList.add('wa-ready');
  }
});

// Video effects
function createVideoIcon() {
  const icons = ['📱','📹','🎥','💬','📲','✨','📞','📺'];
  const iconEl = document.createElement('div');
  iconEl.className = 'video-icon';
  iconEl.innerHTML = icons[Math.floor(Math.random() * icons.length)];
  iconEl.style.left = Math.random() * 100 + 'vw';
  iconEl.style.animationDelay = Math.random() * 4 + 's';
  document.getElementById('videoIcons').appendChild(iconEl);
  setTimeout(() => iconEl.remove(), 7000);
}

setInterval(createVideoIcon, 600);

// Shake animation
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
    20%, 40%, 60%, 80% { transform: translateX(8px); }
  }
`;
document.head.appendChild(shakeStyle);

// Start!
startChat();
</script>
</body>
</html>
